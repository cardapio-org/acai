
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento PIX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  justify-content: center;
  display: flex;
  background: #f5f5f5;
 align-items: flex-start;
}

.box {
  width: 100%;
  max-width: 400px;
  background: white;
  padding: 20px;
  border-radius: 0px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 0px;
    font-size: 75px;
    text-align: center;
    border-radius: 0px;
    border: 0px solid #ccc;
}

h2 {
    margin-bottom: 20px;
  }

button {
  width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background: #0075c8;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#qrcode {
    margin-top: 20px;
    display: flex;
    justify-content: center;
}

.copia {
  white-space: nowrap;
  overflow-x: auto;
  padding: 10px;
  border-radius: 5px;
  margin-top: 10px;
  font-size: 12px;
}

.aguardando {
  color: #010005;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Pagamento via PIX</h2>

  <input type="number" id="valor"  step="0.01">

  <button onclick="criarPix()">Gerar PIX</button>

  <div id="qrcode"></div>

  <div class="copia" id="codigo"></div>

  <button onclick="copiarPix()">Copiar Código PIX</button>

  <div id="status"></div>
</div>

<script>

const URL_API = "https://script.google.com/macros/s/AKfycbxr4EKbnAa81Eoi_prutplxPZDEu_je9Gx7Rziu3w4x6d47Y_L70vkRZmDA4J4BAE16UA/exec";

let transactionId = null;
let codigoPixAtual = "";
let intervalo = null;
let pago = false;

// ===============================
// CRIAR PIX
// ===============================
async function criarPix() {
  const valor = document.getElementById("valor").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor válido!");
    return;
  }

  pago = false;

  document.getElementById("status").innerHTML =
    "<div class='aguardando'>Gerando PIX...</div>";

  try {
    const res = await fetch(`${URL_API}?acao=criar&valor=${valor}`);
    const data = await res.json();

    if (data.erro) throw new Error(data.mensagem);

    transactionId = data.transaction_id;
    codigoPixAtual = data.pix_copy_paste;

    document.getElementById("codigo").innerText = codigoPixAtual;

    document.getElementById("qrcode").innerHTML =
      `<img src="data:image/png;base64,${data.qr_code_base64}" width="200"/>`;

    document.getElementById("status").innerHTML =
      `<div class='aguardando'>Aguardando pagamento de R$ ${valor}...</div>`;

    iniciarVerificacao();

  } catch (e) {
    console.log("Erro:", e);
    document.getElementById("status").innerHTML =
      "<div style='color:red'>Erro ao gerar PIX</div>";
  }
}

// ===============================
// VERIFICAR PAGAMENTO
// ===============================
function iniciarVerificacao() {
  if (intervalo) clearInterval(intervalo);

  intervalo = setInterval(async () => {
    if (!transactionId || pago) return;

    try {
      const res = await fetch(`${URL_API}?acao=status&id=${transactionId}`);
      const data = await res.json();

      console.log("Status:", data.status);

      // ?? AQUI É O MOMENTO DO ALERTA
      if (data.status === "approved") {
        finalizarPagamento();
      }

    } catch (e) {
      console.log("Erro ao verificar status");
    }

  }, 5000);
}

// ===============================
// FINALIZAR PAGAMENTO
// ===============================
function finalizarPagamento() {
  if (pago) return;

  pago = true;
  clearInterval(intervalo);

  document.getElementById("status").innerHTML =
    "<div class='pago'>PAGAMENTO EFETUADO</div>";

  // ?? ALERTA
  alert("PAGAMENTO EFETUADO");

  // ?? SOM (se quiser)
  document.getElementById("som")?.play();
}

// ===============================
// COPIAR PIX
// ===============================
function copiarPix() {
  if (!codigoPixAtual) {
    alert("Nenhum código PIX disponível!");
    return;
  }

  // Método moderno (HTTPS)
  if (navigator.clipboard) {
    navigator.clipboard.writeText(codigoPixAtual)
      .then(() => {
        alert("Código PIX copiado!");
      })
      .catch(() => {
        copiarFallback();
      });
  } else {
    copiarFallback();
  }
}

// Método alternativo (funciona em qualquer lugar)
function copiarFallback() {
  const textarea = document.createElement("textarea");
  textarea.value = codigoPixAtual;
  document.body.appendChild(textarea);
  textarea.select();
  textarea.setSelectionRange(0, 99999); // mobile

  try {
    document.execCommand("copy");
    alert("Código PIX copiado!");
  } catch (err) {
    alert("Erro ao copiar. Copie manualmente.");
  }

  document.body.removeChild(textarea);
}
</script>

</body>
</html>
